name: Sync settings

on:
  push:
    branches:
      - main

jobs:
  upload_settings:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate JSON files
        run: |
          status=0
          while IFS= read -r -d '' file; do
            if ! jq empty "$file"; then
              echo "Invalid JSON: $file"
              status=1
            fi
          done < <(find . -type f -name '*.json' -print0)
          exit $status

      - name: Build settings index
        env:
          REPO_URL: ${{ github.repository }}
          COMMIT_HASH: ${{ github.sha }}
        run: |
          for branch in legacy nextgen; do
            for file in "LiquidBounce/settings/$branch"/*; do
              [ -f "$file" ] || continue
              jq -n \
                --arg name "$(basename "$file" | cut -f 1 -d '.')" \
                --arg branch "$branch" \
                --arg url "https://raw.githubusercontent.com/${REPO_URL}/${COMMIT_HASH}/${file}" \
                --arg checksum "$(sha256sum "$file" | cut -d ' ' -f 1)" \
                --arg timestamp "$(TZ=UTC0 git log -1 --date=format-local:'%Y-%m-%dT%H:%M:%SZ' --format=%ad -- "$file")" \
                --arg contributors "$(git log -1 --format='%an <%ae>' -- "$file")" \
                '{name: $name, branch: $branch, url: $url, checksum: $checksum, timestamp: $timestamp, contributors: $contributors}'
            done
          done | jq -s '.' > settings.json

      - name: Upload settings
        env:
          AUTHORIZATION: ${{ secrets.AUTHORIZATION }}
        run: |
          curl --fail -sS \
            -H "Authorization: $AUTHORIZATION" \
            -H "Content-Type: application/json" \
            -d @settings.json \
            "https://api.liquidbounce.net/api/v3/marketplace/sync"

      - name: Upload settings.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: settings
          path: settings.json
